<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>المعلم الذكي</title>

<style>

/* 🌐 إعدادات عامة */

*{

  box-sizing: border-box;

}

body{

  margin:0;

  font-family: Arial;

  background:#0b1220;

  color:white;

  padding:15px;

}

/* 📦 الحاوية */

.container{

  max-width:600px;

  margin: auto;

  background:#111a2e;

  padding:20px;

  border-radius:18px;

  /* 📱 هوامش مريحة */

  margin-top:20px;

  margin-bottom:20px;

}

/* 🏷️ العنوان */

h1{

  text-align:center;

  color:#38bdf8;

  font-size:22px;

  margin-bottom:10px;

}

p{

  text-align:center;

  color:#94a3b8;

  font-size:14px;

  margin-bottom:20px;

}

/* 📷 input + textarea */

input, textarea{

  width:100%;

  margin-top:10px;

  padding:12px;

  border-radius:10px;

  background:#1e293b;

  border:1px solid #334155;

  color:white;

  font-size:14px;

}

/* ✍️ textarea */

textarea{

  height:90px;

  resize:none;

}

/* 🚀 زر */

button{

  width:100%;

  margin-top:12px;

  padding:14px;

  background:#22c55e;

  border:none;

  border-radius:10px;

  color:white;

  font-size:16px;

  cursor:pointer;

}

button:active{

  transform:scale(0.98);

}

/* 📊 النتيجة */

.result{

  margin-top:20px;

  background:#0f172a;

  padding:15px;

  /* 📱 هوامش داخلية مريحة */

  border-radius:12px;

  white-space:pre-wrap;

  border-right:4px solid #38bdf8;

  /* 📱 تحسين قراءة الموبايل */

  font-size:14px;

  line-height:1.7;

}

/* 📌 تحسين الموبايل الصغير */

@media (max-width:480px){

  .container{

    padding:15px;

    border-radius:14px;

  }

  h1{

    font-size:20px;

  }

  button{

    font-size:15px;

  }

}

</style>

</head>

<body>

<div class="container">

<h1>📚 المعلم الذكي</h1>

<p>ارفع صورة أو اكتب السؤال وسيتم الحل</p>

<input type="file" id="image">

<textarea id="text" placeholder="✍️ اكتب المطلوب هنا..."></textarea>

<button onclick="solve()">🚀 حل الآن</button>

<div class="result" id="result">النتيجة ستظهر هنا...</div>

</div>

<script>

function solve(){

  const file = document.getElementById("image").files[0];

  const text = document.getElementById("text").value;

  const result = document.getElementById("result");

  result.innerText = "⏳ جاري التحليل...";

  if(file || text){

    result.innerText = `

📚 المعلم الذكي

🖼️ الصورة:

${file ? "تم رفع صورة بنجاح 📷" : "لا توجد صورة"}

✍️ السؤال:

${text || "لا يوجد نص"}

📘 الحل:

✔ تحليل السؤال

✔ تحديد المطلوب

✔ حل خطوة بخطوة

⚡ ملاحظة:

هذه نسخة عرض موبايل فقط (يمكن ربط AI حقيقي لاحقاً)

`;

  } else {

    result.innerText = "❌ من فضلك ارفع صورة أو اكتب سؤال";

  }

}

</script>

</body>

</html>
