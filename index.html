<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>المعلم الذكي</title>

<style>

body{

  margin:0;

  font-family: Arial;

  background:#0b1220;

  color:white;

  padding:15px;

}

.container{

  max-width:600px;

  margin:auto;

  background:#111a2e;

  padding:20px;

  border-radius:18px;

}

h1{

  text-align:center;

  color:#38bdf8;

}

input, textarea{

  width:100%;

  margin-top:10px;

  padding:12px;

  border-radius:10px;

  border:1px solid #334155;

  background:#1e293b;

  color:white;

}

textarea{

  height:90px;

  resize:none;

}

button{

  width:100%;

  margin-top:12px;

  padding:14px;

  background:#22c55e;

  border:none;

  border-radius:10px;

  color:white;

  font-size:16px;

}

.result{

  margin-top:20px;

  background:#0f172a;

  padding:15px;

  border-radius:12px;

  white-space:pre-wrap;

  border-right:4px solid #38bdf8;

}

</style>

</head>

<body>

<div class="container">

<h1>📚 المعلم الذكي</h1>

<input type="file" id="image">

<textarea id="text" placeholder="اكتب السؤال هنا..."></textarea>

<button onclick="solve()">🚀 حل بالذكاء الاصطناعي</button>

<div class="result" id="result">النتيجة ستظهر هنا...</div>

</div>

<script>

// 🔑 API KEY الخاص بك

const API_KEY = "env.GEMINI_API_KEY";

async function solve(){

  const text = document.getElementById("text").value;

  const result = document.getElementById("result");

  result.innerText = "⏳ جاري التفكير...";

  const prompt = `

أنت معلم ذكي.

حل السؤال التالي وشرحه خطوة بخطوة باللغة العربية:

${text}

`;

  try{

    const response = await fetch(

      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,

      {

        method:"POST",

        headers:{

          "Content-Type":"application/json"

        },

        body: JSON.stringify({

          contents:[

            {

              parts:[

                { text: prompt }

              ]

            }

          ]

        })

      }

    );

    const data = await response.json();

    const answer =

      data?.candidates?.[0]?.content?.parts?.[0]?.text

      || "لم يتم الحصول على رد";

    result.innerText = answer;

  }catch(err){

    result.innerText = "خطأ: " + err.message;

  }

}

</script>

</body>

</html>
