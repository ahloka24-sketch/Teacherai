<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>المعلم الذكي</title>

<style>

body{

  font-family: Arial;

  background:#0b1220;

  margin:0;

  color:white;

}

.container{

  max-width:520px;

  margin:50px auto;

  background:#111a2e;

  padding:25px;

  border-radius:18px;

  box-shadow:0 10px 30px rgba(0,0,0,0.4);

}

h1{

  text-align:center;

  color:#38bdf8;

}

input, textarea{

  width:100%;

  margin-top:10px;

  padding:12px;

  border-radius:10px;

  border:1px solid #334155;

  background:#1e293b;

  color:white;

}

textarea{

  height:90px;

  resize:none;

}

button{

  width:100%;

  margin-top:12px;

  padding:12px;

  background:#22c55e;

  border:none;

  border-radius:10px;

  color:white;

  font-size:16px;

  cursor:pointer;

}

.result{

  margin-top:20px;

  background:#0f172a;

  padding:15px;

  border-radius:12px;

  white-space:pre-wrap;

  min-height:120px;

  border-right:4px solid #38bdf8;

}

.note{

  margin-top:10px;

  font-size:12px;

  color:#94a3b8;

  text-align:center;

}

</style>

</head>

<body>

<div class="container">

<h1>📚 المعلم الذكي</h1>

<input type="file" id="image">

<textarea id="text" placeholder="✍️ اكتب المطلوب هنا..."></textarea>

<button onclick="solve()">🚀 حل الآن</button>

<div class="result" id="result">النتيجة ستظهر هنا...</div>

<div class="note">

⚡ يعمل مباشرة على GitHub Pages بدون سيرفر

</div>

</div>

<script>

// 🔑 HuggingFace API (مجاني)

const HF_TOKEN = "PUT_YOUR_HF_TOKEN_HERE";

async function solve(){

  const file = document.getElementById("image").files[0];

  const text = document.getElementById("text").value;

  const result = document.getElementById("result");

  result.innerText = "⏳ جاري التحليل...";

  let caption = "";

  try{

    // 📷 لو فيه صورة

    if(file){

      const base64 = await toBase64(file);

      const response = await fetch(

        "https://api-inference.huggingface.co/models/Salesforce/blip-image-captioning-large",

        {

          method:"POST",

          headers:{

            "Authorization":`Bearer ${HF_TOKEN}`,

            "Content-Type":"application/json"

          },

          body: JSON.stringify({

            inputs: base64.split(",")[1]

          })

        }

      );

      const data = await response.json();

      caption = data?.[0]?.generated_text || "لم يتم فهم الصورة";

    }

    // 🧠 النتيجة النهائية

    result.innerText =

`📚 المعلم الذكي

🖼️ الصورة:

${caption || "لا توجد صورة"}

✍️ المطلوب:

${text || "لا يوجد نص"}

📘 الحل:

تم تحليل السؤال وسيتم شرحه بطريقة مبسطة.

(يمكن تطوير الذكاء لاحقاً إلى حل رياضيات كامل)`;

  }catch(err){

    result.innerText = "خطأ: " + err.message;

  }

}

// 🔄 تحويل الصورة إلى Base64

function toBase64(file){

  return new Promise((resolve,reject)=>{

    const reader = new FileReader();

    reader.onload = ()=> resolve(reader.result);

    reader.onerror = reject;

    reader.readAsDataURL(file);

  });

}

</script>

</body>

</html>
