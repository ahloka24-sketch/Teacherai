<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>المعلم الذكي</title>

  <style>

    body{

      margin:0;

      font-family:Arial;

      background:#0b1220;

      color:white;

      padding:15px;

    }

    .container{

      max-width:650px;

      margin:auto;

      background:#111a2e;

      padding:20px;

      border-radius:18px;

    }

    h1{

      text-align:center;

      color:#38bdf8;

    }

    textarea{

      width:100%;

      margin-top:10px;

      padding:12px;

      border-radius:10px;

      border:1px solid #334155;

      background:#1e293b;

      color:white;

      height:100px;

      resize:none;

    }

    input[type="file"]{

      width:100%;

      margin-top:12px;

      padding:10px;

      border-radius:10px;

      background:#1e293b;

      color:white;

      border:1px solid #334155;

    }

    button{

      width:100%;

      margin-top:12px;

      padding:14px;

      background:#22c55e;

      border:none;

      border-radius:10px;

      color:white;

      font-size:16px;

      cursor:pointer;

    }

    .result{

      margin-top:20px;

      background:#0f172a;

      padding:15px;

      border-radius:12px;

      white-space:pre-wrap;

      border-right:4px solid #38bdf8;

    }

    .preview{

      margin-top:12px;

      text-align:center;

    }

    .preview img{

      max-width:100%;

      border-radius:12px;

      display:none;

      border:1px solid #334155;

    }

  </style>

</head>

<body>

<div class="container">

  <h1>📚 المعلم الذكي</h1>

  <textarea id="text" placeholder="اكتب سؤالك هنا..."></textarea>

  <input type="file" id="imageInput" accept="image/*" />

  <div class="preview">

    <img id="preview" alt="preview">

  </div>

  <button onclick="solve()">🚀 حل بالذكاء الاصطناعي</button>

  <div class="result" id="result">النتيجة ستظهر هنا...</div>

</div>

<script>

const API_URL = "https://teacherai-production.up.railway.app/chat";

const imageInput = document.getElementById("imageInput");

const preview = document.getElementById("preview");

let imageBase64 = "";

imageInput.addEventListener("change", function () {

  const file = this.files[0];

  if (!file) return;

  const reader = new FileReader();

  reader.onload = function (e) {

    imageBase64 = e.target.result;

    preview.src = imageBase64;

    preview.style.display = "block";

  };

  reader.readAsDataURL(file);

});

async function solve() {

  const text = document.getElementById("text").value.trim();

  const result = document.getElementById("result");

  if (!text && !imageBase64) {

    result.innerText = "اكتب سؤالًا أو ارفع صورة أولاً";

    return;

  }

  result.innerText = "⏳ جاري التحليل...";

  try {

    const response = await fetch(API_URL, {

      method: "POST",

      headers: {

        "Content-Type": "application/json"

      },

      body: JSON.stringify({

        prompt: text,

        image: imageBase64

      })

    });

    if (!response.ok) {

      throw new Error("HTTP Error: " + response.status);

    }

    const data = await response.json();

    result.innerText =

      data.text ||

      data.error ||

      "لم يتم الحصول على رد";

  } catch (err) {

    result.innerText = "❌ فشل الاتصال: " + err.message;

  }

}

</script>

</body>

</html>
