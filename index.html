<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>المعلم الذكي</title>

<style>

body{

  margin:0;

  font-family: Arial;

  background:#0b1220;

  color:white;

  padding:15px;

}

.container{

  max-width:600px;

  margin:auto;

  background:#111a2e;

  padding:20px;

  border-radius:18px;

}

h1{

  text-align:center;

  color:#38bdf8;

}

textarea{

  width:100%;

  margin-top:10px;

  padding:12px;

  border-radius:10px;

  border:1px solid #334155;

  background:#1e293b;

  color:white;

  height:100px;

  resize:none;

  font-size:16px;

}

button{

  width:100%;

  margin-top:12px;

  padding:14px;

  background:#22c55e;

  border:none;

  border-radius:10px;

  color:white;

  font-size:16px;

  cursor:pointer;

}

button:active{

  transform:scale(0.98);

}

.result{

  margin-top:20px;

  background:#0f172a;

  padding:15px;

  border-radius:12px;

  white-space:pre-wrap;

  border-right:4px solid #38bdf8;

  min-height:50px;

}

</style>

</head>

<body>

<div class="container">

<h1>📚 المعلم الذكي</h1>

<textarea id="text" placeholder="اكتب سؤالك هنا..."></textarea>

<button onclick="ask()">🚀 إرسال</button>

<div class="result" id="result">النتيجة ستظهر هنا...</div>

</div>

<script>

// 🔥 رابط الـ Cloudflare Worker

const WORKER_URL = "https://teacherai.lohomy2.workers.dev";

async function ask(){

  const text = document.getElementById("text").value;

  const result = document.getElementById("result");

  if(!text){

    result.innerText = "❗ اكتب سؤال أولاً";

    return;

  }

  result.innerText = "⏳ جاري التفكير...";

  try{

    const response = await fetch(WORKER_URL, {

      method: "POST",

      headers: {

        "Content-Type": "application/json"

      },

      body: JSON.stringify({

        prompt: text

      })

    });

    const data = await response.json();

    result.innerText = data.text || data.error || "لا يوجد رد";

  }catch(err){

    result.innerText = "خطأ: " + err.message;

  }

}

</script>

</body>

</html>
